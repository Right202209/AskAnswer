[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "askanswer"
version = "0.1.0"
description = "AskAnswer 命令行搜索助手"
requires-python = ">=3.10"
dependencies = [
    "langchain>=1.0",
    "langchain-core>=0.3.0",
    "langgraph>=1.1.5",
    "langgraph-checkpoint-sqlite>=2.0",
    "mcp",
    "tavily-python",
    "python-dotenv",
    "rich",
    "markitdown",
]

[project.scripts]
askanswer = "askanswer.cli:main"

[tool.setuptools.packages.find]
include = ["askanswer*"]
