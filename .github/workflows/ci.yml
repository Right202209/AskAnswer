name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Lint baseline (E/F/I). Config lives in [tool.ruff] of pyproject.toml.
      - name: Ruff
        run: ruff check askanswer tests

      # Suite runs with no API key: LLM/network are mocked and conftest
      # isolates env vars + points the state DB at a temp dir.
      - name: Pytest
        run: pytest -q
